<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Saturn Five · Deal Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root{
    --void:#080d16;
    --deck:#0d1522;
    --panel:#131e30;
    --panel-2:#18263c;
    --line:#26364f;
    --line-soft:#1c2a41;
    --ink:#eef3fb;
    --muted:#8496b3;
    --muted-2:#5f708c;
    --signal:#ffb02e;      /* telemetry amber */
    --signal-dim:#7a5a1c;
    --go:#37d9a0;          /* PURSUE */
    --watch:#ffb02e;       /* WATCH */
    --pass:#ff5d6c;        /* PASS */
    --cyan:#5ab0ff;        /* AI / chat */
    --grid: rgba(90,176,255,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--void);
    color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    font-size:14px;line-height:1.5;
  }
  #root{height:100vh}
  .mono{font-family:"JetBrains Mono",monospace}
  .disp{font-family:"Space Grotesk",sans-serif}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#22334d;border-radius:6px;border:2px solid var(--deck)}
  ::-webkit-scrollbar-track{background:transparent}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2)}

  /* shell */
  .shell{display:grid;grid-template-columns:290px 1fr;height:100vh;overflow:hidden}
  .rail{background:linear-gradient(180deg,var(--deck),#0a111c);border-right:1px solid var(--line-soft);display:flex;flex-direction:column;min-height:0}
  .main{position:relative;min-width:0;overflow:hidden;display:flex;flex-direction:column;
    background:
      radial-gradient(1200px 600px at 78% -8%, rgba(90,176,255,.06), transparent 60%),
      linear-gradient(180deg,#0b111d,#080d16);
  }
  .main::before{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px;mask-image:linear-gradient(180deg,rgba(0,0,0,.5),transparent 70%)}

  /* brand */
  .brand{padding:18px 18px 14px;border-bottom:1px solid var(--line-soft);display:flex;gap:12px;align-items:center}
  .logo{width:38px;height:38px;flex:0 0 auto;border-radius:9px;background:radial-gradient(circle at 50% 35%,#1b2c46,#0c1421);border:1px solid var(--line);display:grid;place-items:center;position:relative;overflow:hidden}
  .logo svg{width:24px;height:24px}
  .brand h1{font-family:"Space Grotesk";font-size:15px;font-weight:600;margin:0;letter-spacing:.02em}
  .brand .sub{font-family:"JetBrains Mono";font-size:9.5px;letter-spacing:.24em;color:var(--muted-2);text-transform:uppercase;margin-top:2px}

  .secure{margin:12px 14px 4px;display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line-soft);border-radius:8px;background:rgba(55,217,160,.05)}
  .secure .dot{width:7px;height:7px;border-radius:50%;background:var(--go);box-shadow:0 0 8px var(--go);flex:0 0 auto}
  .secure span{font-family:"JetBrains Mono";font-size:10px;letter-spacing:.06em;color:#9fe6cb;line-height:1.35}

  .newbtn{margin:12px 14px;padding:11px 14px;border-radius:9px;border:1px solid var(--signal-dim);
    background:linear-gradient(180deg,rgba(255,176,46,.16),rgba(255,176,46,.06));color:var(--signal);
    font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
  .newbtn:hover{background:rgba(255,176,46,.2);box-shadow:0 0 0 1px var(--signal-dim)}

  .rosterhead{padding:6px 18px;display:flex;justify-content:space-between;align-items:center}
  .roster{overflow-y:auto;flex:1;padding:2px 10px 14px;min-height:0}
  .ritem{width:100%;text-align:left;background:transparent;border:1px solid transparent;border-radius:9px;padding:11px 12px;margin-bottom:5px;display:flex;gap:11px;align-items:flex-start;transition:.13s;color:inherit}
  .ritem:hover{background:var(--panel);border-color:var(--line-soft)}
  .ritem.active{background:var(--panel);border-color:var(--line)}
  .rlight{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:0 0 auto;background:#33435d}
  .rlight.PURSUE{background:var(--go);box-shadow:0 0 7px var(--go)}
  .rlight.WATCH{background:var(--watch);box-shadow:0 0 7px var(--watch)}
  .rlight.PASS{background:var(--pass);box-shadow:0 0 7px var(--pass)}
  .rlight.pulse{animation:pulse 1.1s infinite}
  @keyframes pulse{50%{opacity:.25}}
  .rname{font-weight:600;font-size:13px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rmeta{font-family:"JetBrains Mono";font-size:10px;color:var(--muted-2);margin-top:3px;letter-spacing:.04em}
  .rscore{margin-left:auto;font-family:"JetBrains Mono";font-size:15px;font-weight:700;flex:0 0 auto}
  .rempty{color:var(--muted-2);font-size:12px;padding:16px 12px;line-height:1.6}

  /* main scroll */
  .stage{position:relative;z-index:1;overflow-y:auto;flex:1;min-height:0}
  .wrap{max-width:1120px;margin:0 auto;padding:26px 30px 60px}

  /* empty */
  .empty{height:100%;display:grid;place-items:center;position:relative;z-index:1;text-align:center;padding:30px}
  .empty .ring{width:120px;height:120px;margin:0 auto 26px}
  .empty h2{font-family:"Space Grotesk";font-weight:600;font-size:26px;margin:0 0 10px;letter-spacing:-.01em}
  .empty p{color:var(--muted);max-width:440px;margin:0 auto 22px;line-height:1.65}

  /* header card */
  .head{display:grid;grid-template-columns:1fr auto;gap:26px;align-items:center;
    background:linear-gradient(180deg,var(--panel),rgba(19,30,48,.4));border:1px solid var(--line-soft);
    border-radius:16px;padding:24px 26px;position:relative;overflow:hidden}
  .head::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--signal),transparent)}
  .h-name{font-family:"Space Grotesk";font-size:27px;font-weight:600;letter-spacing:-.01em;margin:6px 0 4px;line-height:1.1}
  .h-one{color:var(--muted);max-width:640px;line-height:1.55}
  .tel{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
  .tcell{background:var(--deck);border:1px solid var(--line-soft);border-radius:10px;padding:9px 13px;min-width:104px}
  .tcell .k{font-family:"JetBrains Mono";font-size:9px;letter-spacing:.16em;color:var(--muted-2);text-transform:uppercase}
  .tcell .v{font-family:"JetBrains Mono";font-size:18px;font-weight:700;margin-top:3px}
  .tcell .v small{font-size:11px;color:var(--muted);font-weight:500}

  /* gauge */
  .gaugebox{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:220px}
  .verdictlights{display:flex;gap:7px}
  .vl{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line-soft);font-family:"JetBrains Mono";font-size:10px;letter-spacing:.1em;color:var(--muted-2);opacity:.5;transition:.2s}
  .vl .b{width:7px;height:7px;border-radius:50%;background:currentColor}
  .vl.PURSUE{color:var(--go)} .vl.WATCH{color:var(--watch)} .vl.PASS{color:var(--pass)}
  .vl.on{opacity:1;border-color:currentColor;background:rgba(255,255,255,.03);box-shadow:0 0 14px -4px currentColor}

  /* tabs */
  .tabs{display:flex;gap:2px;margin:22px 0 18px;border-bottom:1px solid var(--line-soft)}
  .tab{background:transparent;border:none;color:var(--muted);padding:12px 18px;font-size:13px;font-weight:600;position:relative;letter-spacing:.01em}
  .tab .cnt{font-family:"JetBrains Mono";font-size:10px;color:var(--muted-2);margin-left:6px}
  .tab.active{color:var(--ink)}
  .tab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;background:var(--signal)}
  .tab:hover{color:var(--ink)}

  /* panels/cards */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;padding:18px 20px}
  .card h3{font-family:"Space Grotesk";font-size:13px;font-weight:600;margin:0 0 14px;display:flex;align-items:center;gap:9px;letter-spacing:.02em}
  .card h3 .tag{font-family:"JetBrains Mono";font-size:9px;letter-spacing:.14em;padding:3px 7px;border-radius:5px;color:var(--void);font-weight:700}
  .tag.go{background:var(--go)} .tag.pass{background:var(--pass)} .tag.risk{background:var(--signal)} .tag.ai{background:var(--cyan)}
  .summary{line-height:1.7;color:#d6deec}
  .lead{color:var(--muted);font-size:12.5px;margin:-6px 0 14px;line-height:1.6}

  ul.pc{list-style:none;margin:0;padding:0}
  ul.pc li{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid var(--line-soft);line-height:1.5;color:#d6deec;font-size:13px}
  ul.pc li:last-child{border-bottom:none}
  ul.pc li .m{flex:0 0 auto;margin-top:1px;font-family:"JetBrains Mono";font-weight:700}
  ul.pc.pros .m{color:var(--go)} ul.pc.cons .m{color:var(--pass)} ul.pc.risks .m{color:var(--signal)}

  /* ratings */
  .ratings{display:flex;flex-direction:column;gap:14px}
  .rrow .rl{display:flex;justify-content:space-between;margin-bottom:6px}
  .rrow .rl .name{font-size:12.5px;font-weight:500}
  .rrow .rl .num{font-family:"JetBrains Mono";font-weight:700;font-size:12.5px}
  .bar{height:7px;border-radius:4px;background:var(--deck);overflow:hidden;border:1px solid var(--line-soft)}
  .bar > i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--cyan),var(--go));transition:width .6s cubic-bezier(.2,.7,.2,1)}
  input[type=range]{-webkit-appearance:none;width:100%;height:7px;border-radius:4px;background:var(--deck);border:1px solid var(--line-soft);outline:none;margin:0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--signal);border:2px solid var(--void);cursor:pointer;box-shadow:0 0 8px -2px var(--signal)}

  .steps{counter-reset:s;list-style:none;margin:0;padding:0}
  .steps li{position:relative;padding:11px 0 11px 40px;border-bottom:1px solid var(--line-soft);line-height:1.55;color:#d6deec;font-size:13px}
  .steps li:last-child{border-bottom:none}
  .steps li::before{counter-increment:s;content:counter(s,decimal-leading-zero);position:absolute;left:0;top:11px;font-family:"JetBrains Mono";font-size:11px;font-weight:700;color:var(--signal);border:1px solid var(--signal-dim);border-radius:6px;padding:2px 6px}

  /* review form */
  .field{margin-bottom:18px}
  .field label{display:block;font-family:"JetBrains Mono";font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:7px}
  .field textarea,.field input[type=text]{width:100%;background:var(--deck);border:1px solid var(--line-soft);border-radius:9px;color:var(--ink);padding:11px 13px;font-size:13px;line-height:1.6;resize:vertical}
  .field textarea:focus,.field input:focus{border-color:var(--cyan);outline:none}
  .listedit .row{display:flex;gap:8px;margin-bottom:7px}
  .listedit .row input{flex:1}
  .iconbtn{background:var(--deck);border:1px solid var(--line-soft);border-radius:8px;color:var(--muted);width:38px;flex:0 0 auto;display:grid;place-items:center;font-size:15px}
  .iconbtn:hover{color:var(--pass);border-color:var(--pass)}
  .addbtn{background:transparent;border:1px dashed var(--line);border-radius:8px;color:var(--muted);padding:8px 12px;font-size:12px;width:100%}
  .addbtn:hover{color:var(--ink);border-color:var(--muted)}
  .verdictpick{display:flex;gap:8px}
  .vp{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line-soft);background:var(--deck);color:var(--muted);font-weight:600;font-family:"JetBrains Mono";font-size:12px;letter-spacing:.08em;transition:.15s}
  .vp.PURSUE.sel{color:var(--go);border-color:var(--go);background:rgba(55,217,160,.08)}
  .vp.WATCH.sel{color:var(--watch);border-color:var(--watch);background:rgba(255,176,46,.08)}
  .vp.PASS.sel{color:var(--pass);border-color:var(--pass);background:rgba(255,93,108,.08)}
  .savebar{position:sticky;bottom:0;margin-top:6px;padding:14px 0;display:flex;gap:12px;align-items:center;background:linear-gradient(0deg,var(--void) 60%,transparent)}
  .savebtn{padding:11px 22px;border-radius:9px;border:1px solid var(--go);background:rgba(55,217,160,.14);color:var(--go);font-weight:600;font-size:13px}
  .savebtn:hover{background:rgba(55,217,160,.22)}
  .saved{font-family:"JetBrains Mono";font-size:11px;color:var(--go)}

  /* chat */
  .chatwrap{display:flex;flex-direction:column;height:calc(100vh - 300px);min-height:420px;background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;overflow:hidden}
  .chatscroll{flex:1;overflow-y:auto;padding:20px 22px}
  .chatnote{text-align:center;color:var(--muted-2);font-size:12px;padding:20px;line-height:1.7;max-width:460px;margin:0 auto}
  .msg{display:flex;gap:12px;margin-bottom:18px;max-width:88%}
  .msg .av{width:28px;height:28px;flex:0 0 auto;border-radius:8px;display:grid;place-items:center;font-family:"JetBrains Mono";font-size:10px;font-weight:700}
  .msg.user{margin-left:auto;flex-direction:row-reverse}
  .msg.user .av{background:rgba(255,176,46,.14);color:var(--signal);border:1px solid var(--signal-dim)}
  .msg.ai .av{background:rgba(90,176,255,.12);color:var(--cyan);border:1px solid #2c5a8a}
  .bubble{padding:12px 15px;border-radius:12px;line-height:1.65;font-size:13.5px;white-space:pre-wrap}
  .msg.user .bubble{background:rgba(255,176,46,.1);border:1px solid var(--signal-dim)}
  .msg.ai .bubble{background:var(--deck);border:1px solid var(--line-soft);color:#dce4f0}
  .chatbar{border-top:1px solid var(--line-soft);padding:14px;display:flex;gap:10px;background:var(--deck)}
  .chatbar textarea{flex:1;background:var(--panel);border:1px solid var(--line-soft);border-radius:10px;color:var(--ink);padding:11px 13px;font-size:13.5px;resize:none;line-height:1.5;max-height:120px}
  .chatbar textarea:focus{border-color:var(--cyan);outline:none}
  .sendbtn{align-self:flex-end;background:var(--cyan);border:none;color:var(--void);border-radius:10px;width:46px;height:46px;display:grid;place-items:center;font-weight:700}
  .sendbtn:disabled{opacity:.4;cursor:default}
  .suggest{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
  .chip{background:var(--deck);border:1px solid var(--line-soft);border-radius:999px;padding:7px 13px;font-size:12px;color:var(--muted)}
  .chip:hover{color:var(--ink);border-color:var(--cyan)}
  .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--cyan);margin:0 2px;animation:blink 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

  /* modal */
  .backdrop{position:fixed;inset:0;background:rgba(4,8,14,.72);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:50;padding:20px}
  .modal{width:min(560px,100%);background:linear-gradient(180deg,var(--panel),var(--deck));border:1px solid var(--line);border-radius:16px;padding:26px;position:relative}
  .modal h2{font-family:"Space Grotesk";font-size:19px;margin:0 0 4px;font-weight:600}
  .modal p.sub{color:var(--muted);font-size:12.5px;margin:0 0 20px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:34px 20px;text-align:center;transition:.15s;cursor:pointer;background:rgba(90,176,255,.03)}
  .drop.over{border-color:var(--cyan);background:rgba(90,176,255,.08)}
  .drop .ic{font-size:30px;margin-bottom:10px}
  .drop strong{color:var(--cyan)}
  .drop small{display:block;color:var(--muted-2);margin-top:8px;font-family:"JetBrains Mono";font-size:10px;letter-spacing:.06em}
  .or{text-align:center;color:var(--muted-2);font-family:"JetBrains Mono";font-size:10px;letter-spacing:.2em;margin:16px 0}
  .modal textarea{width:100%;background:var(--deck);border:1px solid var(--line-soft);border-radius:10px;color:var(--ink);padding:12px;font-size:13px;min-height:110px;resize:vertical}
  .modal textarea:focus{border-color:var(--cyan);outline:none}
  .mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .ghost{background:transparent;border:1px solid var(--line);border-radius:9px;color:var(--muted);padding:10px 18px;font-size:13px;font-weight:600}
  .ghost:hover{color:var(--ink)}
  .primary{background:var(--signal);border:none;border-radius:9px;color:var(--void);padding:10px 20px;font-size:13px;font-weight:700}
  .primary:disabled{opacity:.4;cursor:default}
  .filechip{display:flex;align-items:center;gap:10px;background:var(--deck);border:1px solid var(--line-soft);border-radius:10px;padding:11px 14px;margin-top:6px;font-size:13px}
  .filechip .x{margin-left:auto;color:var(--muted)}
  .filechip .x:hover{color:var(--pass)}

  .analyzing{text-align:center;padding:20px 10px}
  .analyzing .scan{font-family:"JetBrains Mono";font-size:11px;color:var(--cyan);letter-spacing:.08em;margin-top:16px;min-height:16px}
  .prog{height:4px;background:var(--deck);border-radius:3px;overflow:hidden;margin-top:14px}
  .prog > i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--signal));width:0;transition:width .4s}
  .errbox{background:rgba(255,93,108,.08);border:1px solid var(--pass);border-radius:10px;padding:14px;color:#ffb4bb;font-size:12.5px;line-height:1.6;margin-top:14px}

  .kebab{background:transparent;border:none;color:var(--muted-2);font-size:18px;padding:0 6px}
  .kebab:hover{color:var(--pass)}

  @media (max-width:860px){
    .shell{grid-template-columns:1fr}
    .rail{position:fixed;z-index:40;width:290px;height:100vh;transform:translateX(-100%);transition:.2s}
    .rail.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6)}
    .grid2{grid-template-columns:1fr}
    .head{grid-template-columns:1fr}
    .menutoggle{display:grid!important}
  }
  .menutoggle{display:none;position:absolute;top:16px;left:16px;z-index:5;width:40px;height:40px;place-items:center;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:18px}

  /* auth + setup */
  .authwrap{height:100vh;display:grid;place-items:center;padding:24px;position:relative;
    background:radial-gradient(1000px 700px at 50% -10%, rgba(90,176,255,.08), transparent 60%),linear-gradient(180deg,#0b111d,#080d16)}
  .authwrap::before{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px;mask-image:radial-gradient(600px 400px at 50% 40%,rgba(0,0,0,.6),transparent 75%)}
  .authcard{position:relative;z-index:1;width:min(440px,100%);text-align:center;
    background:linear-gradient(180deg,var(--panel),var(--deck));border:1px solid var(--line);border-radius:18px;padding:38px 34px}
  .authcard .logo{width:56px;height:56px;margin:0 auto 20px}
  .authcard .logo svg{width:34px;height:34px}
  .authcard h1{font-family:"Space Grotesk";font-size:24px;font-weight:600;margin:0 0 6px;letter-spacing:-.01em}
  .authcard p{color:var(--muted);line-height:1.6;margin:0 0 26px;font-size:13.5px}
  .gbtn{display:flex;justify-content:center;min-height:44px}
  .authnote{margin-top:22px;font-family:"JetBrains Mono";font-size:10px;letter-spacing:.06em;color:var(--muted-2);line-height:1.7}
  .authnote .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--go);box-shadow:0 0 7px var(--go);margin-right:6px}
  .setup{text-align:left;max-width:560px}
  .setup h1{text-align:center}
  .setup ol{padding-left:18px;margin:0 0 8px;line-height:1.8;font-size:13px;color:#d6deec}

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

/* ============================================================
   CONFIG  — edit these three, then deploy.
   ============================================================ */
// 1) Paste your Google OAuth Client ID (ends in .apps.googleusercontent.com)
const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";
// 2) A model available on YOUR Anthropic account (see docs.claude.com models page)
const MODEL = "claude-sonnet-4-5";
// 3) false = this browser only (works instantly). true = Cloudflare KV cross-device (needs setup — see README).
const CLOUD_STORAGE = false;
/* ============================================================ */
const VERDICTS = ["PURSUE","WATCH","PASS"];
const RATING_KEYS = [
  ["financials","Financial quality"],
  ["market","Market & industry"],
  ["moat","Moat / durability"],
  ["management","Mgmt & transition"],
  ["fit","S5 thesis fit"],
];

/* ---------- storage helpers ---------- */
/* ---------- auth helpers ---------- */
function authHeaders(extra){ return Object.assign({Authorization:"Bearer "+(store.idToken||"")}, extra||{}); }
function decodeJwt(t){
  try{ const p=t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    return JSON.parse(decodeURIComponent(escape(atob(p)))); }catch(e){ return null; }
}

/* ---------- storage backends ---------- */
const LocalBackend = {
  async get(uk){ const v=localStorage.getItem(uk); return v?JSON.parse(v):null; },
  async set(uk,val){ localStorage.setItem(uk, JSON.stringify(val)); },
  async del(uk){ localStorage.removeItem(uk); },
};
const CloudBackend = {
  async get(uk){ const r=await fetch("/api/data?key="+encodeURIComponent(uk),{headers:authHeaders()});
    if(r.status===404) return null; if(!r.ok) throw new Error("data "+r.status);
    const j=await r.json(); return (j && "value" in j)? j.value : null; },
  async set(uk,val){ const r=await fetch("/api/data?key="+encodeURIComponent(uk),{method:"PUT",
    headers:authHeaders({"Content-Type":"application/json"}),body:JSON.stringify({value:val})});
    if(!r.ok) throw new Error("data "+r.status); },
  async del(uk){ await fetch("/api/data?key="+encodeURIComponent(uk),{method:"DELETE",headers:authHeaders()}); },
};
const backend = CLOUD_STORAGE ? CloudBackend : LocalBackend;

const store = {
  userId:"anon", idToken:"",
  key(k){ return "dd:"+this.userId+":"+k; },
  async get(k){ try{ return await backend.get(this.key(k)); }catch(e){ console.error("read failed",e); return null; } },
  async set(k,v){ try{ await backend.set(this.key(k),v); return true; }catch(e){ console.error("save failed",e); return false; } },
  async del(k){ try{ await backend.del(this.key(k)); }catch(e){} },
};
const uid = () => "d"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ---------- Anthropic API ---------- */
async function callClaude(messages, {system, pdf, max_tokens=1500}={}){
  const userContent = pdf
    ? [ {type:"document",source:{type:"base64",media_type:"application/pdf",data:pdf}}, {type:"text",text:messages} ]
    : messages;
  const msgs = (typeof userContent === "string" || pdf)
    ? [{role:"user", content: userContent}]
    : userContent; // array of {role,content}
  const body = { model: MODEL, max_tokens, messages: msgs };
  if(system) body.system = system;

  let res;
  try{
    res = await fetch("/api/chat",{
      method:"POST",
      headers: authHeaders({"Content-Type":"application/json"}),
      body: JSON.stringify(body),
    });
  }catch(e){ throw new Error("NETWORK"); }

  if(res.status===401 || res.status===403) throw new Error("AUTH");
  if(res.status===404) throw new Error("NO_FUNCTION");
  if(res.status===429) throw new Error("RATE_LIMIT");
  if(!res.ok){ const t=await res.text().catch(()=>""); throw new Error("API "+res.status+" "+t.slice(0,160)); }
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function friendlyError(e){
  const m=(e&&e.message)||"";
  if(m==="NO_FUNCTION") return "The AI service isn't running here. It works automatically once deployed to Cloudflare Pages. To test locally, run: npx wrangler pages dev .";
  if(m==="AUTH") return "Your sign-in expired or isn't authorized. Sign out and back in, and check the allowlist in the Cloudflare function.";
  if(m==="RATE_LIMIT") return "Anthropic is rate-limiting the API key right now. Wait a moment and try again.";
  if(m==="NETWORK") return "Couldn't reach the server. Check your connection and try again.";
  return "Something went wrong: "+m;
}
function parseJSON(text){
  let t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const a=t.indexOf("{"), b=t.lastIndexOf("}");
  if(a>=0 && b>a) t=t.slice(a,b+1);
  return JSON.parse(t);
}

const ANALYSIS_PROMPT = `You are the lead analyst on Saturn Five's Deals Team. Saturn Five is a permanent-hold investment firm that buys controlling interests in durable, cash-flow-generating small businesses — typically $2–10M EBITDA, bought at 4–6x, blue-collar / "moves atoms" (trades, manufacturing, service). No fund clock: returns come from ongoing distributions (~25% cash-on-cash target), not exits. Judge this deal against THAT thesis.

Read the attached Confidential Information Memorandum and return ONLY a JSON object (no markdown, no prose) with EXACTLY these keys:
{
 "name": string,                       // company / entity for sale
 "oneLiner": string,                   // <=22 words, what it is
 "industry": string,
 "location": string,
 "revenue": string,                    // most recent, e.g. "$12.2M TTM"
 "ebitda": string,                     // adj. EBITDA, e.g. "$2.4M"
 "years": string,                      // years in business, e.g. "37"
 "askNote": string,                    // asking price / multiple note, or "Not disclosed"
 "summary": string,                    // 3-4 sentence deal summary
 "pros": [string],                     // 5 items, each <=18 words
 "cons": [string],                     // 5 items, each <=18 words
 "risks": [string],                    // 3 diligence risk flags, each <=16 words
 "ratings": {"financials":int,"market":int,"moat":int,"management":int,"fit":int}, // each 0-100
 "overall": int,                       // 0-100 overall score
 "verdict": "PURSUE"|"WATCH"|"PASS",
 "verdictReason": string,              // <=32 words, why this verdict for S5 specifically
 "nextSteps": [string]                 // 4 concrete diligence / process steps, each <=18 words
}
Be specific and honest — name the tradeoff. Do not inflate scores.`;

const DIGEST_PROMPT = `You are briefing Saturn Five's Deals Team. Read the attached CIM and write a dense ~230-word factual digest capturing: what the company does, financials (revenue, EBITDA, margins, growth), customers & concentration, operations/assets, management & transition, deal structure, and notable risks. Plain text, no headers, no preamble. This will ground later Q&A, so pack in the concrete facts and numbers.`;

/* ================= AUTH GATE ================= */
function Root(){
  const [user,setUser]=useState(null);
  const [ready,setReady]=useState(false);
  const configured = !GOOGLE_CLIENT_ID.startsWith("YOUR_GOOGLE_CLIENT_ID");

  const onCredential = useCallback((resp)=>{
    const token=resp.credential; const p=decodeJwt(token);
    if(!p) return;
    store.userId=p.sub; store.idToken=token;
    setUser({sub:p.sub,name:p.name||p.email,email:p.email,picture:p.picture});
  },[]);

  useEffect(()=>{
    if(!configured) return;
    let tries=0;
    const iv=setInterval(()=>{
      if(window.google && window.google.accounts && window.google.accounts.id){
        clearInterval(iv);
        window.google.accounts.id.initialize({
          client_id:GOOGLE_CLIENT_ID, callback:onCredential, auto_select:true, cancel_on_tap_outside:false,
        });
        setReady(true);
        window.google.accounts.id.prompt(); // silent re-sign-in for returning users
      }else if(++tries>60){ clearInterval(iv); setReady(true); }
    },100);
    return ()=>clearInterval(iv);
  },[configured,onCredential]);

  const signOut=()=>{
    try{ window.google?.accounts?.id?.disableAutoSelect(); }catch(e){}
    store.userId="anon"; store.idToken=""; setUser(null);
  };

  if(!configured) return <SetupScreen/>;
  if(!user) return <AuthScreen ready={ready} onCredential={onCredential}/>;
  return <App user={user} onSignOut={signOut}/>;
}

function AuthScreen({ready,onCredential}){

  useEffect(()=>{
    if(ready && window.google && btnRef.current){
      window.google.accounts.id.renderButton(btnRef.current,

      </div>
    </div>
  );
}

/* ================= APP ================= */
function App({user,onSignOut}){
  const [deals,setDeals]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [tab,setTab]=useState("analysis");
  const [showModal,setShowModal]=useState(false);
  const [railOpen,setRailOpen]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const pdfCache = useRef({}); // id -> base64 (session only)

  useEffect(()=>{ (async()=>{
    const idx = await store.get("deal_index") || [];
    const full = [];
    for(const meta of idx){ const d = await store.get("deal_"+meta.id); if(d) full.push(d); }
    full.sort((a,b)=>b.createdAt-a.createdAt);
    setDeals(full); setLoaded(true);
    if(full.length) setActiveId(full[0].id);
  })(); },[]);

  const persistIndex = useCallback(async(list)=>{
    await store.set("deal_index", list.map(d=>({id:d.id,name:d.name,verdict:d.verdict,overall:d.overall,createdAt:d.createdAt})));
  },[]);

  const saveDeal = useCallback(async(deal)=>{
    await store.set("deal_"+deal.id, deal);
    setDeals(prev=>{ const next=prev.map(d=>d.id===deal.id?deal:d); persistIndex(next); return next; });
  },[persistIndex]);

  const addDeal = useCallback(async(deal)=>{
    setDeals(prev=>{ const next=[deal,...prev]; persistIndex(next); return next; });
    await store.set("deal_"+deal.id, deal);
  },[persistIndex]);

  const removeDeal = useCallback(async(id)=>{
    await store.del("deal_"+id);
    setDeals(prev=>{ const next=prev.filter(d=>d.id!==id); persistIndex(next);
      if(activeId===id) setActiveId(next[0]?.id||null); return next; });
  },[activeId,persistIndex]);

  const active = deals.find(d=>d.id===activeId)||null;

  return (
    <div className="shell">
      <button className="menutoggle" onClick={()=>setRailOpen(o=>!o)}>☰</button>
      <Rail deals={deals} activeId={activeId} loaded={loaded} user={user} onSignOut={onSignOut}

      <div className="main">
        {!active
          ? <Empty onNew={()=>setShowModal(true)} loaded={loaded}/>
          : <DealView key={active.id} deal={active} tab={tab} setTab={setTab}
              saveDeal={saveDeal} removeDeal={removeDeal} pdfCache={pdfCache}/>}
      </div>
      {showModal && <UploadModal onClose={()=>setShowModal(false)} addDeal={addDeal}
          saveDeal={saveDeal} setActive={setActiveId} setTab={setTab} pdfCache={pdfCache}/>}
    </div>
  );
}

        <div style={{minWidth:0,flex:1}}>

/* ---------- Gauge (signature instrument) ---------- */
function Gauge({value}){
  const [v,setV]=useState(0);
  useEffect(()=>{ const t=setTimeout(()=>setV(value),120); return ()=>clearTimeout(t); },[value]);
  const R=78, cx=95, cy=95;
  const a0=Math.PI, a1=0;                    // 180° -> 0°
  const ang=a0+(a1-a0)*(v/100);
  const pt=(r,a)=>[cx+r*Math.cos(a), cy-r*Math.sin(a)];
  const arc=(r,frac)=>{ const e=a0+(a1-a0)*frac; const [sx,sy]=pt(r,a0),[ex,ey]=pt(r,e);
    return `M ${sx} ${sy} A ${r} ${r} 0 0 1 ${ex} ${ey}`; };
  const [nx,ny]=pt(R-14,ang);
  const col=scoreColor(v);
  return (
    <svg viewBox="0 0 190 118" style={{width:220}}>
      <path d={arc(R,1)} stroke="#1c2a41" strokeWidth="10" fill="none" strokeLinecap="round"/>
      <path d={arc(R,v/100)} stroke={col} strokeWidth="10" fill="none" strokeLinecap="round"
        style={{transition:"all .9s cubic-bezier(.2,.7,.2,1)", filter:`drop-shadow(0 0 6px ${col})`}}/>
      {[0,25,50,75,100].map(m=>{ const [tx,ty]=pt(R+13,a0+(a1-a0)*(m/100));
        return <text key={m} x={tx} y={ty} fill="#5f708c" fontSize="8" fontFamily="JetBrains Mono"
          textAnchor="middle" dominantBaseline="middle">{m}</text>; })}
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke={col} strokeWidth="2.5" strokeLinecap="round"
        style={{transition:"all .9s cubic-bezier(.2,.7,.2,1)"}}/>
      <circle cx={cx} cy={cy} r="5" fill="#0d1522" stroke={col} strokeWidth="2"/>
      <text x={cx} y={cy-22} fill={col} fontSize="30" fontFamily="JetBrains Mono" fontWeight="700"
        textAnchor="middle">{Math.round(v)}</text>
      <text x={cx} y={cy-6} fill="#5f708c" fontSize="8" fontFamily="JetBrains Mono"
        letterSpacing="2" textAnchor="middle">DEAL SCORE</text>
    </svg>
  );
}

/* ---------- Analysis (read view) ---------- */
function Analysis({deal}){
  return (

        <div style={{marginTop:16,padding:"12px 15px",borderRadius:10,background:"var(--deck)",borderLeft:"3px solid "+verdictColor(deal.verdict)}}>
          <span className="eyebrow" style={{color:verdictColor(deal.verdict)}}>Verdict · {deal.verdict}</span>
          <div style={{marginTop:6,lineHeight:1.6,color:"#dce4f0"}}>{deal.verdictReason}</div>
        </div>
      </div>

      <div className="grid2" style={{marginBottom:16}}>
        <div className="card">
          <h3>Pros <span className="tag go">FOR</span></h3>
          <ul className="pc pros">{(deal.pros||[]).map((p,i)=><li key={i}><span className="m">+</span>{p}</li>)}</ul>
        </div>
        <div className="card">
          <h3>Cons <span className="tag pass">AGAINST</span></h3>
          <ul className="pc cons">{(deal.cons||[]).map((c,i)=><li key={i}><span className="m">–</span>{c}</li>)}</ul>
        </div>
      </div>

      <div className="grid2">
        <div className="card">
          <h3>Ratings</h3>
          <div className="ratings">
            {RATING_KEYS.map(([k,label])=>(
              <div className="rrow" key={k}>
                <div className="rl"><span className="name">{label}</span>
                  <span className="num" style={{color:scoreColor(deal.ratings?.[k])}}>{deal.ratings?.[k]??"–"}</span></div>
                <div className="bar"><i style={{width:(deal.ratings?.[k]||0)+"%"}}></i></div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <h3>Risk flags <span className="tag risk">DILIGENCE</span></h3>
          <ul className="pc risks">{(deal.risks||[]).map((r,i)=><li key={i}><span className="m">!</span>{r}</li>)}</ul>
        </div>
      </div>

      <div className="card" style={{marginTop:16}}>
        <h3>Recommended next steps</h3>
        <ol className="steps">{(deal.nextSteps||[]).map((s,i)=><li key={i}>{s}</li>)}</ol>
      </div>

      {deal.analystNotes && <div className="card" style={{marginTop:16}}>
        <h3>Analyst notes</h3><div className="summary">{deal.analystNotes}</div>
      </div>}
    </div>
  );
}
function verdictColor(v){ return v==="PURSUE"?"var(--go)":v==="PASS"?"var(--pass)":"var(--watch)"; }

/* ---------- Review (edit view) ---------- */
function Review({deal,saveDeal}){
  const [d,setD]=useState(deal);
  const [saved,setSaved]=useState(false);
  useEffect(()=>{setD(deal);},[deal.id]);
  const upd=(patch)=>{ setD(p=>({...p,...patch})); setSaved(false); };
  const updList=(key,i,val)=>{ const arr=[...(d[key]||[])]; arr[i]=val; upd({[key]:arr}); };
  const addItem=(key)=>upd({[key]:[...(d[key]||[]),""]});
  const delItem=(key,i)=>upd({[key]:(d[key]||[]).filter((_,x)=>x!==i)});
  const updRating=(k,v)=>upd({ratings:{...d.ratings,[k]:+v}});
  const save=async()=>{ await saveDeal(d); setSaved(true); };

  return (
    <div>
      <div className="card">
        <p className="lead" style={{marginTop:0}}>Everything here is yours to overwrite — the AI pass is a starting point, not the record. Your edits are what the deck keeps.</p>
        <div className="field"><label>Deal summary</label>
          <textarea rows="4" value={d.summary||""} onChange={e=>upd({summary:e.target.value})}/></div>

        <div className="grid2">
          <div className="field"><label>Company name</label>
            <input type="text" value={d.name||""} onChange={e=>upd({name:e.target.value})}/></div>
          <div className="field"><label>One-liner</label>
            <input type="text" value={d.oneLiner||""} onChange={e=>upd({oneLiner:e.target.value})}/></div>
        </div>
      </div>

      <div className="grid2" style={{marginTop:16}}>
        <div className="card"><h3>Pros</h3><ListEdit items={d.pros} onChange={(i,v)=>updList("pros",i,v)}
          onAdd={()=>addItem("pros")} onDel={i=>delItem("pros",i)} ph="A reason to pursue"/></div>
        <div className="card"><h3>Cons</h3><ListEdit items={d.cons} onChange={(i,v)=>updList("cons",i,v)}
          onAdd={()=>addItem("cons")} onDel={i=>delItem("cons",i)} ph="A concern"/></div>
      </div>

      <div className="grid2" style={{marginTop:16}}>
        <div className="card"><h3>Ratings</h3>
          <div className="ratings">{RATING_KEYS.map(([k,label])=>(
            <div className="rrow" key={k}>
              <div className="rl"><span className="name">{label}</span>
                <span className="num" style={{color:scoreColor(d.ratings?.[k])}}>{d.ratings?.[k]??0}</span></div>
              <input type="range" min="0" max="100" value={d.ratings?.[k]??0} onChange={e=>updRating(k,e.target.value)}/>
            </div>))}
          </div>
        </div>
        <div className="card"><h3>Risk flags</h3><ListEdit items={d.risks} onChange={(i,v)=>updList("risks",i,v)}
          onAdd={()=>addItem("risks")} onDel={i=>delItem("risks",i)} ph="A diligence risk"/></div>
      </div>

      <div className="card" style={{marginTop:16}}>
        <div className="field" style={{marginBottom:20}}><label>Overall deal score — {d.overall??0}</label>
          <input type="range" min="0" max="100" value={d.overall??0} onChange={e=>upd({overall:+e.target.value})}/></div>
        <div className="field" style={{marginBottom:0}}><label>Final verdict</label>
          <div className="verdictpick">{VERDICTS.map(v=>(
            <button key={v} className={"vp "+v+(d.verdict===v?" sel":"")} onClick={()=>upd({verdict:v})}>{v}</button>
          ))}</div>
        </div>
        <div className="field" style={{marginTop:18,marginBottom:0}}><label>Verdict rationale</label>
          <textarea rows="2" value={d.verdictReason||""} onChange={e=>upd({verdictReason:e.target.value})}/></div>
      </div>

      <div className="card" style={{marginTop:16}}><h3>Recommended next steps</h3>
        <ListEdit items={d.nextSteps} onChange={(i,v)=>updList("nextSteps",i,v)}
          onAdd={()=>addItem("nextSteps")} onDel={i=>delItem("nextSteps",i)} ph="A concrete next step"/></div>

      <div className="card" style={{marginTop:16}}><h3>Analyst notes</h3>
        <div className="field" style={{marginBottom:0}}>
          <textarea rows="4" placeholder="Your own read — anything the AI missed, gut checks, questions for the seller call…"
            value={d.analystNotes||""} onChange={e=>upd({analystNotes:e.target.value})}/></div>
      </div>

      <div className="savebar">
        <button className="savebtn" onClick={save}>Save review</button>
        {saved && <span className="saved">✓ Saved to deck</span>}
      </div>
    </div>
  );
}
function ListEdit({items,onChange,onAdd,onDel,ph}){
  return (
    <div className="listedit">
      {(items||[]).map((v,i)=>(
        <div className="row" key={i}>
          <input type="text" value={v} placeholder={ph} onChange={e=>onChange(i,e.target.value)}/>
          <button className="iconbtn" onClick={()=>onDel(i)} title="Remove">✕</button>
        </div>
      ))}
      <button className="addbtn" onClick={onAdd}>＋ Add</button>
    </div>
  );
}

/* ---------- Chat ---------- */
function Chat({deal,saveDeal,pdfCache}){
  const [messages,setMessages]=useState(deal.chat||[]);
  const [input,setInput]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const scrollRef=useRef(null);
  useEffect(()=>{setMessages(deal.chat||[]);},[deal.id]);
  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },[messages,busy]);

  const system = `You are Saturn Five's deal analyst assistant, answering questions about ONE specific CIM for the S5 Deals Team. S5 is a permanent-hold firm buying durable small businesses ($2-10M EBITDA, 4-6x, blue-collar, returns via distributions not exits). Ground every answer in the deal facts below; if something isn't covered, say it's not in the CIM and flag it as a diligence item. Be concise, specific, and honest about tradeoffs.

=== DEAL: ${deal.name} ===
${deal.digest||deal.summary}

CURRENT VERDICT: ${deal.verdict} (${deal.overall}/100) — ${deal.verdictReason}
PROS: ${(deal.pros||[]).join("; ")}
CONS: ${(deal.cons||[]).join("; ")}
RISKS: ${(deal.risks||[]).join("; ")}`;

  const send=async(text)=>{
    const q=(text??input).trim(); if(!q||busy) return;
    setErr(""); setInput("");
    const next=[...messages,{role:"user",content:q}];
    setMessages(next); setBusy(true);
    try{
      const reply=await callClaude(next.map(m=>({role:m.role,content:m.content})),{system});
      const done=[...next,{role:"assistant",content:reply}];
      setMessages(done); await saveDeal({...deal,chat:done});
    }catch(e){
      setErr(friendlyError(e));
      setMessages(messages);
    }finally{ setBusy(false); }
  };

  const suggestions=["What's the biggest risk here?","How does this fit the S5 thesis?","How concentrated is the customer base?","What would you ask on the seller call?"];

  return (
    <div className="chatwrap">
      <div className="chatscroll" ref={scrollRef}>
        {messages.length===0 && !busy &&
          <div>
            <div className="chatnote">
              Ask anything about <strong style={{color:"var(--ink)"}}>{deal.name}</strong>. Answers are grounded in this CIM and the S5 thesis — the conversation stays on this deck.
            </div>
            <div className="suggest">{suggestions.map(s=>
              <button key={s} className="chip" onClick={()=>send(s)}>{s}</button>)}</div>
          </div>}
        {messages.map((m,i)=>(
          <div className={"msg "+(m.role==="user"?"user":"ai")} key={i}>
            <div className="av">{m.role==="user"?"YOU":"S5"}</div>
            <div className="bubble">{m.content}</div>
          </div>
        ))}
        {busy && <div className="msg ai"><div className="av">S5</div>
          <div className="bubble dots"><span></span><span></span><span></span></div></div>}
        {err && <div className="errbox">{err}</div>}
      </div>
      <div className="chatbar">
        <textarea rows="1" placeholder="Ask about this deal…" value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}/>
        <button className="sendbtn" onClick={()=>send()} disabled={busy||!input.trim()}>↑</button>
      </div>
    </div>
  );
}

/* ---------- Upload modal ---------- */
function UploadModal({onClose,addDeal,saveDeal,setActive,setTab,pdfCache}){
  const [file,setFile]=useState(null);
  const [pasted,setPasted]=useState("");
  const [over,setOver]=useState(false);
  const [phase,setPhase]=useState("pick"); // pick | run | error
  const [scan,setScan]=useState("");
  const [prog,setProg]=useState(0);
  const [err,setErr]=useState("");
  const inputRef=useRef(null);

  const pickFile=(f)=>{ if(!f) return; if(f.type!=="application/pdf"){ setErr("That's not a PDF. Upload the CIM as a PDF, or paste its text below."); return;} setErr(""); setFile(f); };
  const toB64=(f)=>new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=()=>rej(new Error("read")); r.readAsDataURL(f); });

  const run=async()=>{
    if(!file && pasted.trim().length<40){ setErr("Add a PDF or paste at least a few paragraphs of the CIM."); return; }
    setPhase("run"); setErr(""); setProg(8);
    const id=uid(); let pdf=null;
    try{
      setScan("Reading document…");
      if(file){ pdf=await toB64(file); }
      setProg(22);
      setScan("Extracting facts & briefing digest…");
      const opts = pdf ? {pdf} : {};
      const analysisInput = pdf ? ANALYSIS_PROMPT : (ANALYSIS_PROMPT+"\n\nCIM TEXT:\n"+pasted);
      const digestInput   = pdf ? DIGEST_PROMPT   : (DIGEST_PROMPT+"\n\nCIM TEXT:\n"+pasted);
      const [aRaw,digest]=await Promise.all([
        callClaude(analysisInput, opts),
        callClaude(digestInput, opts),
      ]);
      setProg(72); setScan("Scoring against the S5 thesis…");
      const a=parseJSON(aRaw);
      const deal={
        id, createdAt:Date.now(), status:"ready", chat:[], analystNotes:"", digest,
        name:a.name||file?.name?.replace(/\.pdf$/i,"")||"Untitled CIM",
        oneLiner:a.oneLiner||"", industry:a.industry||"", location:a.location||"",
        revenue:a.revenue||"", ebitda:a.ebitda||"", years:a.years||"", askNote:a.askNote||"Not disclosed",
        summary:a.summary||"", pros:a.pros||[], cons:a.cons||[], risks:a.risks||[],
        ratings:a.ratings||{financials:0,market:0,moat:0,management:0,fit:0},
        overall:clamp(a.overall), verdict:VERDICTS.includes(a.verdict)?a.verdict:"WATCH",
        verdictReason:a.verdictReason||"", nextSteps:a.nextSteps||[],
      };
      setProg(100); setScan("Done.");
      if(pdf) pdfCache.current[id]=pdf;
      await addDeal(deal);
      setTimeout(()=>{ setActive(id); setTab("analysis"); onClose(); },350);
    }catch(e){
      console.error(e);
      const base=friendlyError(e);
      setErr(base.startsWith("Something went wrong")
        ? "The analysis didn't come back cleanly. Very large or image-only PDFs can cause this — try again, or paste the key text instead."
        : base);
      setPhase("error");
    }
  };

  return (
    <div className="backdrop" onClick={e=>{ if(e.target===e.currentTarget && phase!=="run") onClose(); }}>
      <div className="modal">
        {phase!=="run" && <>
          <div className="eyebrow" style={{marginBottom:8}}>New deal · intake</div>
          <h2>Upload a CIM</h2>
          <p className="sub">Deal Deck reads it once, on this deck, and drafts the review. The document isn't shared or published.</p>

          <div className={"drop"+(over?" over":"")}
            onClick={()=>inputRef.current.click()}
            onDragOver={e=>{e.preventDefault();setOver(true);}}
            onDragLeave={()=>setOver(false)}
            onDrop={e=>{e.preventDefault();setOver(false);pickFile(e.dataTransfer.files[0]);}}>
            <div className="ic">📄</div>
            <div><strong>Choose a PDF</strong> or drop it here</div>
            <small>CONFIDENTIAL · STAYS ON THIS DECK</small>
            <input ref={inputRef} type="file" accept="application/pdf" hidden
              onChange={e=>pickFile(e.target.files[0])}/>
          </div>

          {file && <div className="filechip">
            <span>📎</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{file.name}</span>
            <button className="x" onClick={()=>setFile(null)}>✕</button>
          </div>}

          <div className="or">— OR PASTE TEXT —</div>
          <textarea placeholder="Paste the CIM text here if you don't have the PDF handy…"
            value={pasted} onChange={e=>setPasted(e.target.value)}/>

          {err && <div className="errbox">{err}</div>}

          <div className="mfoot">
            <button className="ghost" onClick={onClose}>Cancel</button>
            <button className="primary" onClick={run} disabled={!file && pasted.trim().length<40}>Run analysis</button>
          </div>
        </>}

        {phase==="run" && <div className="analyzing">
          <div className="eyebrow" style={{marginBottom:16}}>Analyzing</div>
          <svg viewBox="0 0 120 120" style={{width:96}} fill="none">
            <circle cx="60" cy="60" r="44" stroke="#1c2a41" strokeWidth="3"/>
            <circle cx="60" cy="60" r="44" stroke="#5ab0ff" strokeWidth="3" strokeLinecap="round"
              strokeDasharray="70 210" >
              <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="1.1s" repeatCount="indefinite"/>
            </circle>
            <circle cx="60" cy="60" r="6" fill="#ffb02e"/>
          </svg>
          <div className="prog"><i style={{width:prog+"%"}}></i></div>
          <div className="scan">{scan}</div>
        </div>}
      </div>
    </div>
  );
}
function clamp(n){ n=+n; if(isNaN(n)) return 0; return Math.max(0,Math.min(100,Math.round(n))); }

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
